services:
  iot-backend:
    build:
      context: ../iot-platform-backend-dev
      dockerfile: ../deplay/Dockerfile
    container_name: iot-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./backend.env.external-db
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
