name: iot_app_flutter
description: IoT app migrated from the uni-app client
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  go_router: ^14.0.0
  dio: ^5.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cached_network_image: ^3.3.0
  logger: ^2.0.0
  flutter_svg: ^2.0.0
  webview_flutter: ^4.8.0
  mobile_scanner: ^7.2.0
  geolocator: ^14.0.3
  geocoding: ^4.0.0
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
