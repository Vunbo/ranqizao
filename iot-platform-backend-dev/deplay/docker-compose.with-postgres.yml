services:
  postgres:
    image: postgres:16-alpine
    container_name: iot-postgres
    restart: unless-stopped
    env_file:
      - ./backend.env.docker-postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  iot-backend:
    build:
      context: ../iot-platform-backend-dev
      dockerfile: ../deplay/Dockerfile
    container_name: iot-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    env_file:
      - ./backend.env.docker-postgres
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres-data:
