# iot-platform-backend-dev 部署配置
# 适用：临时 IP 访问 / 无域名场景
# 后续有域名后替换 server_name 并配置 HTTPS

server {
    listen 80;
    listen [::]:80;

    # 如果有域名就填域名，没有就填服务器 IP（浏览器访问 IP 时会跳过 host 校验）
    server_name _;

    client_max_body_size 10M;

    # ===== API 反向代理 =====
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 跨域（后端已处理，Nginx 层不需要额外配置）
    }

    # ===== 运营后台静态文件 =====
    # 构建后的 iot-ops-web-dev/dist/ 放在此目录
    # location / {
    #     root /srv/ranqizao/iot-ops-web-dev/dist;
    #     index index.html;
    #     try_files $uri $uri/ /index.html;
    # }

    # ===== 健康检查（可选）=====
    location /health {
        access_log off;
        return 200 "OK\n";
    }

    # ===== 日志 =====
    access_log /var/log/nginx/ranqizao-access.log;
    error_log  /var/log/nginx/ranqizao-error.log;
}
